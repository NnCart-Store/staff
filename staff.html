<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NnCart Staff Pro Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>
<body class="bg-gray-100 font-sans">

<header class="bg-[#003399] text-white p-5 shadow-lg flex justify-between">
    <div>
        <h1 class="text-xl font-bold">NnCart Staff Ultimate</h1>
        <p class="text-xs opacity-80">Full Automation System</p>
    </div>
    <div id="netStatus" class="text-xs">🌐 Online</div>
</header>

<div class="p-4 space-y-4">

    <!-- Worker -->
    <div class="bg-white p-4 rounded-xl shadow">
        <label class="text-xs text-gray-400">Worker Name</label>
        <input id="workerId" placeholder="Apna Naam Likho"
        class="w-full text-lg font-bold border-b outline-none">
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3">
        <div class="bg-green-100 p-4 rounded-xl text-center">
            <p class="text-xs">Today Packed</p>
            <h2 id="countBox" class="text-2xl font-bold">0</h2>
        </div>
        <div class="bg-blue-100 p-4 rounded-xl text-center">
            <p class="text-xs">Last Order</p>
            <h2 id="lastBox" class="text-sm font-bold">---</h2>
        </div>
    </div>

    <!-- Scanner -->
    <div id="reader" class="bg-white rounded-xl p-2" style="min-height:250px;"></div>

    <!-- Status -->
    <div id="statusBox" class="text-center font-bold text-sm"></div>

</div>

<script>
let scanner;
let scanning=false;
let lastScan="";
let count=0;

const scriptURL="https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec";

// LOAD
window.onload=()=>{
    const w=localStorage.getItem("worker");
    const c=localStorage.getItem("count");

    if(w) document.getElementById("workerId").value=w;
    if(c){
        count=parseInt(c);
        document.getElementById("countBox").innerText=count;
    }

    checkNet();
    setInterval(checkNet,3000);

    autoStart();
};

// NETWORK
function checkNet(){
    const el=document.getElementById("netStatus");
    if(navigator.onLine){
        el.innerText="🌐 Online";
        el.className="text-green-300 text-xs";
    }else{
        el.innerText="❌ Offline";
        el.className="text-red-300 text-xs";
    }
}

// INPUT
document.getElementById("workerId").addEventListener("input",()=>{
    const val=document.getElementById("workerId").value.trim();
    if(val){
        localStorage.setItem("worker",val);
        autoStart();
    }
});

// STATUS
function show(msg,color){
    const el=document.getElementById("statusBox");
    el.innerText=msg;
    el.className=`text-${color}-600 font-bold`;
}

// START SCANNER
async function autoStart(){
    if(scanning) return;

    const worker=document.getElementById("workerId").value.trim();
    if(!worker) return;

    try{
        scanner=new Html5Qrcode("reader");
        scanning=true;

        await scanner.start(
            {facingMode:"environment"},
            {fps:12,qrbox:{width:250,height:150}},
            async(text)=>{

                if(text===lastScan) return;
                lastScan=text;

                scanning=false;

                await scanner.stop();
                await scanner.clear();

                process(text,worker);
            }
        );

    }catch(e){
        show("Camera Error","red");
        scanning=false;
    }
}

// PROCESS
async function process(id,worker){

    if(!navigator.onLine){
        show("No Internet","red");
        restart();
        return;
    }

    document.getElementById("lastBox").innerText=id;

    show("Processing...","blue");

    try{
        const res=await fetch(`${scriptURL}?action=packOrder&orderId=${encodeURIComponent(id)}&worker=${encodeURIComponent(worker)}`,{method:"POST"});

        if(!res.ok) throw new Error();

        count++;
        localStorage.setItem("count",count);
        document.getElementById("countBox").innerText=count;

        show("Packed ✔","green");

        successFX();

    }catch{
        show("Failed ❌","red");
    }

    setTimeout(restart,1500);
}

// RESTART
function restart(){
    setTimeout(autoStart,500);
}

// SUCCESS EFFECT
function successFX(){
    if(navigator.vibrate) navigator.vibrate([100,50,100]);

    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    o.frequency.value=700;
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),120);
}
</script>

<style>
#reader video{
    width:100%!important;
    border-radius:12px;
    object-fit:cover;
}
</style>

</body>
</html>
