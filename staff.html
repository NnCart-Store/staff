<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart Staff Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-[#003399] text-white p-5 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">NnCart Staff</h1>
            <p class="text-[10px] opacity-80">Order Processing Unit</p>
        </div>
        <i class="fa-solid fa-user-gear text-2xl text-yellow-400"></i>
    </header>

    <div class="p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-600">
            <label class="text-[10px] font-bold text-gray-400 uppercase">Worker ID / Name</label>
            <input type="text" id="workerId" placeholder="Apna Naam Likhen" 
                   class="w-full text-lg font-bold outline-none border-b-2 border-gray-100 focus:border-blue-600 transition-all">
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm">
            <h2 class="text-sm font-bold mb-3 text-gray-700"><i class="fa-solid fa-barcode mr-2"></i>Scan Parcel Barcode</h2>
            <div id="reader" class="overflow-hidden rounded-xl bg-gray-50 border-2 border-dashed border-gray-200" style="min-height: 250px;"></div>
            
            <button onclick="startScanning()" id="startBtn" class="w-full mt-4 bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all">
                START SCANNER
            </button>
        </div>

        <div id="statusBox" class="hidden p-4 rounded-2xl border transition-all duration-300">
            <p id="statusMsg" class="text-center font-bold text-sm"></p>
        </div>
    </div>

    <script>
        let html5QrCode;
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec';

        // Yaad rakho pichla naam
        window.onload = () => {
            const savedName = localStorage.getItem('lastWorker');
            if (savedName) document.getElementById('workerId').value = savedName;
        };

        async function startScanning() {
            const worker = document.getElementById('workerId').value;
            if(!worker) {
                alert("Bhai, pehle apna naam (Worker ID) likho!");
                return;
            }
            localStorage.setItem('lastWorker', worker);

            document.getElementById('startBtn').classList.add('hidden');
            
            // Purane instance ko saaf karo
            if (html5QrCode) {
                await html5QrCode.clear();
            }

            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 10, // 15 se 10 kiya taaki phone hang na ho
                qrbox: { width: 250, height: 150 },
                aspectRatio: 1.0 
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                async (decodedText) => {
                    // Behtar flow: Pehle stop karo phir data bhejo
                    await html5QrCode.stop();
                    document.getElementById('reader').innerHTML = ""; 
                    document.getElementById('startBtn').classList.remove('hidden');
                    
                    handleScanSuccess(decodedText, worker);
                }
            ).catch(err => {
                alert("Camera Error: " + err);
                document.getElementById('startBtn').classList.remove('hidden');
            });
        }

        function handleScanSuccess(orderId, worker) {
            const statusBox = document.getElementById('statusBox');
            const statusMsg = document.getElementById('statusMsg');
            
            statusBox.classList.remove('hidden', 'bg-green-50', 'bg-red-50');
            statusBox.classList.add('bg-blue-50', 'border-blue-200');
            statusMsg.innerText = `Updating: Order #${orderId}...`;
            statusMsg.className = "text-center font-bold text-sm text-blue-700";

            // Reliable URL method
            const finalURL = `${scriptURL}?action=packOrder&orderId=${encodeURIComponent(orderId)}&worker=${encodeURIComponent(worker)}`;
            
            fetch(finalURL, {
                method: 'POST',
                mode: 'no-cors'
            })
            .then(() => {
                statusBox.classList.replace('bg-blue-50', 'bg-green-50');
                statusBox.classList.replace('border-blue-200', 'border-green-200');
                statusMsg.innerText = `✅ Order #${orderId} Packed by ${worker}`;
                statusMsg.className = "text-center font-bold text-sm text-green-700";
                
                setTimeout(() => { statusBox.classList.add('hidden'); }, 4000);
            })
            .catch(err => {
                statusBox.classList.replace('bg-blue-50', 'bg-red-50');
                statusMsg.innerText = "❌ Connection Fail! Check Internet.";
                statusMsg.className = "text-center font-bold text-sm text-red-700";
            });
        }
    </script>

    <style>
        #reader__dashboard_section_csr button {
            background-color: #003399 !important;
            color: white !important;
            padding: 8px 15px !important;
            border-radius: 8px !important;
            font-size: 12px !important;
        }
        #reader video { border-radius: 12px; object-fit: cover; width: 100% !important; }
    </style>
</body>
</html>
