<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NnCart Staff System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f3f4f6}
#reader video{width:100%!important;border-radius:12px;object-fit:cover}
</style>
</head>

<body>

<header style="background:#003399;color:white;padding:15px;display:flex;justify-content:space-between">
<div>
<h2>NnCart Staff System</h2>
<small>Full Warehouse Mode</small>
</div>
<div id="net">🌐 Online</div>
</header>

<div style="padding:10px">

<!-- Worker -->
<div style="background:white;padding:10px;border-radius:10px;margin-bottom:10px">
<input id="worker" placeholder="Apna Naam Likho"
style="width:100%;font-size:18px;border:none;border-bottom:2px solid #ccc;outline:none">
</div>

<!-- Stats -->
<div style="display:flex;gap:10px;margin-bottom:10px">
<div style="flex:1;background:#d1fae5;padding:10px;border-radius:10px;text-align:center">
<p>Today Packed</p>
<h2 id="count">0</h2>
</div>

<div style="flex:1;background:#dbeafe;padding:10px;border-radius:10px;text-align:center">
<p>Last Scan</p>
<h2 id="last">---</h2>
</div>
</div>

<!-- Scanner -->
<div id="reader" style="background:white;border-radius:10px;min-height:250px"></div>

<!-- Status -->
<div id="status" style="text-align:center;font-weight:bold;margin-top:10px"></div>

</div>

<script>
let scanner=null;
let scanning=false;
let lastScan="";
let count=0;

const scriptURL="https://script.google.com/macros/s/AKfycbwnQRCdMGFgLKt4e5i-RbetOt4h88Qg1vDDgFWgkiATafh0Fe9crFSJKtQPHv2Gb09E/exec";

// LOAD
window.onload=()=>{
let w=localStorage.getItem("worker");
let c=localStorage.getItem("count");

if(w) document.getElementById("worker").value=w;
if(c){count=parseInt(c);document.getElementById("count").innerText=count;}

checkNet();
setInterval(checkNet,3000);

autoStart();
};

// NETWORK
function checkNet(){
let el=document.getElementById("net");
if(navigator.onLine){
el.innerText="🌐 Online";
}else{
el.innerText="❌ Offline";
}
}

// SAVE NAME
document.getElementById("worker").addEventListener("input",()=>{
let val=document.getElementById("worker").value.trim();
if(val){
localStorage.setItem("worker",val);
autoStart();
}
});

// STATUS
function show(msg,color){
let el=document.getElementById("status");
el.innerText=msg;
el.style.color=color;
}

// START SCANNER
async function autoStart(){

if(scanning) return;

let worker=document.getElementById("worker").value.trim();
if(!worker) return;

try{

scanner=new Html5Qrcode("reader");
scanning=true;

await scanner.start(
{facingMode:"environment"},
{fps:12,qrbox:{width:250,height:150}},
async(text)=>{

if(text===lastScan) return;
lastScan=text;

scanning=false;

await safeStop();

process(text,worker);
}
);

}catch(e){
show("Camera Error","red");
scanning=false;
}
}

// SAFE STOP CAMERA
async function safeStop(){
try{
if(scanner){
await scanner.stop();
await scanner.clear();
scanner=null;
}
}catch(e){}
}

// PROCESS ORDER
async function process(id,worker){

document.getElementById("last").innerText=id;

if(!navigator.onLine){
show("No Internet","red");
restart();
return;
}

show("Processing...","blue");

try{

// 1. fetch order data
let res1=await fetch(`${scriptURL}?action=getOrder&orderId=${encodeURIComponent(id)}`);
let data=await res1.json();

// fallback dummy
if(!data || !data.name){
data={
name:"Customer",
address:"Unknown Address",
phone:"0000000000"
};
}

// 2. print label (browser mode)
createLabel(id,data,worker);

// 3. update order
await fetch(`${scriptURL}?action=packOrder&orderId=${encodeURIComponent(id)}&worker=${encodeURIComponent(worker)}`,{method:"POST"});

// 4. counter
count++;
localStorage.setItem("count",count);
document.getElementById("count").innerText=count;

show("Packed ✔","green");

successFX();

}catch(e){
show("Error ❌","red");
}

setTimeout(restart,2000);
}

// CREATE LABEL
function createLabel(id,data,worker){

let html=`
<html>
<body style="font-family:sans-serif">
<h3>NnCart Shipping Label</h3>
<hr>
<p><b>Order:</b> ${id}</p>
<p><b>Name:</b> ${data.name}</p>
<p><b>Address:</b> ${data.address}</p>
<p><b>Phone:</b> ${data.phone}</p>
<hr>
<p>Packed By: ${worker}</p>
</body>
</html>
`;

let w=window.open("");
w.document.write(html);
w.document.close();

setTimeout(()=>{
w.print();
},500);
}

// SUCCESS EFFECT
function successFX(){

if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

try{
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.frequency.value=700;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),120);
}catch(e){}
}

// RESTART SCANNER
function restart(){
setTimeout(autoStart,500);
}
</script>

</body>
</html>
